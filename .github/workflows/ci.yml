name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade uv
      - run: uv sync --frozen
      - run: uv run ruff check src tests
      - run: uv run ruff format src tests --check
      - run: uv run mypy src

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: xauusdt
          POSTGRES_PASSWORD: xauusdt
          POSTGRES_DB: xauusdt
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      TEST_DATABASE_URL: postgresql+asyncpg://xauusdt:xauusdt@localhost:5432/xauusdt_test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade uv
      - run: uv sync --frozen
      # Create test database (uses default 'postgres' DB via env var fallback)
      - run: |
          uv run python -c "
          import asyncio
          from sqlalchemy import text
          from sqlalchemy.ext.asyncio import create_async_engine

          async def create():
              engine = create_async_engine('postgresql+asyncpg://xauusdt:xauusdt@localhost:5432/xauusdt', echo=False)
              async with engine.connect() as conn:
                  await conn.execute(text('COMMIT'))
                  r = await conn.execute(text(\"SELECT 1 FROM pg_database WHERE datname='xauusdt_test'\"))
                  if not r.scalar():
                      await conn.execute(text('CREATE DATABASE xauusdt_test'))
              await engine.dispose()
          asyncio.run(create())
        name: Create test database
      - run: uv run pytest
