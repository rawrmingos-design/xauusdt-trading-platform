services:
  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      - APP_NAME=xauusdt-trading-platform
      - ENV=development
      - LOG_LEVEL=INFO
      - DB_URL=postgresql+asyncpg://xauusdt:xauusdt@postgres:5432/xauusdt
      - REDIS_URL=redis://redis:6379/0
      - BITGET_API_BASE=https://api.bitget.com
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import xauusdt"]
      interval: 30s
      timeout: 10s
      retries: 3

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: xauusdt
      POSTGRES_PASSWORD: xauusdt
      POSTGRES_DB: xauusdt
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U xauusdt"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
